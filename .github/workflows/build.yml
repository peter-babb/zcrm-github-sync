name: Build Windows App

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          echo "Current directory:"
          pwd
          echo "Files:"
          ls -la
          echo "package.json contents:"
          cat package.json
        shell: bash
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm run build:win
      - uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: dist/*.exe
